<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <title>Codex Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        .progress-bar { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .toastify {
            padding: 12px 16px !important; 
            color: #334155 !important; 
            background: #ffffff !important;
            border: 1px solid #e2e8f0 !important; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03) !important;
            border-radius: 12px !important; 
            font-family: inherit !important; 
            font-size: 14px !important; 
            font-weight: 500 !important;
            display: flex !important; 
            align-items: center !important; 
            gap: 10px !important; 
            width: 90% !important;        /* 移动端友好 */
            max-width: 450px !important;  /* 限制最大宽度 */
            white-space: normal !important; /* 允许换行 */
            word-break: break-all !important; /* 强制长单词换行 */
        }
        .toast-close { display: none !important; }
        .toastify.on { animation: slideInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards !important; }
        @keyframes slideInUp { from { transform: translate(0, 20px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 p-8 font-sans text-slate-800">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Codex Manager</h1>
            
            <div class="flex gap-3">
                <button onclick="oneClickLoginAndSave()" class="flex items-center gap-1.5 text-sm bg-slate-900 text-white border border-slate-900 px-4 py-2 rounded-lg hover:bg-slate-800 transition-all shadow-sm font-medium">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    一键添加新账号
                </button>
                
                <button onclick="fetchAccounts(true)" id="refreshListBtn" class="flex items-center gap-1.5 text-sm bg-white border border-slate-200 px-4 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all shadow-sm text-slate-600 font-medium">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    刷新列表
                </button>
            </div>
        </header>

        <div id="accountList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-slate-900/30 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity opacity-0">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 transform scale-95 transition-all" id="addModalContent">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-bold text-slate-800">保存当前账号</h2>
                <button onclick="closeAddModal()" class="text-slate-400 hover:text-slate-600 rounded-lg p-1 hover:bg-slate-100 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <p class="text-sm text-slate-500 mb-5 leading-relaxed">此操作会将你当前的 Codex 登录凭据备份到列表中。请确保你已在终端执行过 <code class="bg-slate-100 px-1 py-0.5 rounded text-slate-700">codex login</code>。</p>
            
            <input type="text" id="newAccountName" placeholder="给这个账号起个名字 (如: work-01)" 
                class="w-full border border-slate-200 rounded-xl px-4 py-3 text-slate-700 text-sm focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 mb-6 transition-all"
                onkeypress="if(event.key === 'Enter') submitAddAccount()">
            
            <div class="flex gap-3">
                <button onclick="closeAddModal()" class="flex-1 py-2.5 rounded-xl text-slate-600 text-sm font-medium hover:bg-slate-50 border border-slate-200 transition-colors">取消</button>
                <button onclick="submitAddAccount()" class="flex-1 py-2.5 rounded-xl text-white text-sm font-medium bg-slate-900 hover:bg-slate-800 transition-colors shadow-sm">确认保存</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        async function oneClickLoginAndSave() {
            // 1. 弹出初始化提示
            showToast("请在弹出的窗口中完成登录...", "info");
            
            try {
                // 2. 发起请求，这个请求会一直 Pending，直到你登录完并关掉黑窗口
                const res = await fetch("/api/login-and-auto-save", { 
                    method: "POST",
                    // 登录可能需要点时间，确保不超时（虽然本地请求通常不限时）
                });
                
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || "操作取消");

                // 3. 提示成功并刷新
                showToast(`账号 [${data.name}] 已自动提取并保存！`, "success");
                fetchAccounts(); 
                
            } catch (e) {
                console.error(e);
                showToast(e.message === "Failed to fetch" ? "请求超时，但账号可能已保存，请刷新查看" : e.message, "error");
            }
        }

        let activeToast = null;

        function showToast(message, type = 'success') {
            if (activeToast) { try { activeToast.hideToast(); } catch (e) {} }
            const icons = {
                success: `<svg class="w-5 h-5 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>`,
                error: `<svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>`,
                info: `<svg class="w-5 h-5 text-blue-500 shrink-0 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`
            };
            const node = document.createElement("div");
            node.className = "flex items-center gap-2.5";
            node.innerHTML = `${icons[type]}<span class="leading-normal">${message}</span>`;
            activeToast = Toastify({ node: node, duration: 2500, gravity: "top", position: "center", stopOnFocus: true });
            activeToast.showToast();
        }

        // --- 弹窗控制逻辑 ---
        const modal = document.getElementById('addModal');
        const modalContent = document.getElementById('addModalContent');
        const nameInput = document.getElementById('newAccountName');

        function openAddModal() {
            modal.classList.remove('hidden');
            // 触发过渡动画
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
                nameInput.focus();
            }, 10);
        }

        function closeAddModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                nameInput.value = ''; // 清空输入框
            }, 200); // 等待动画完成
        }

        async function submitAddAccount() {
            const name = nameInput.value.trim();
            if (!name) {
                showToast("账号名称不能为空", "error");
                nameInput.focus();
                return;
            }

            try {
                showToast("正在保存账号...", "info");
                const res = await fetch("/api/add", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name }),
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "保存失败");

                showToast(`已成功保存账号: ${name}`, "success");
                closeAddModal();
                fetchAccounts(); // 刷新列表
            } catch (e) {
                showToast(e.message, "error"); // 显示后端抛出的错误（如重复账号）
                nameInput.focus();
            }
        }

        // 点击遮罩层关闭弹窗
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeAddModal();
        });

        // --- 原有核心逻辑 ---
        async function fetchAccounts(isManual = false) {
            const btn = document.getElementById('refreshListBtn');
            const svg = btn?.querySelector('svg');
            if (isManual && svg) svg.classList.add('animate-spin');
            try {
                const res = await fetch("/api/accounts");
                if (!res.ok) throw new Error("接口请求失败");
                const data = await res.json();
                render(data.accounts);
                if (isManual) showToast("账号列表已刷新", "success");
            } catch (e) {
                if (isManual) showToast("获取列表失败，请检查服务", "error");
            } finally {
                if (isManual && svg) svg.classList.remove('animate-spin');
            }
        }

        async function switchAccount(name) {
            try {
                showToast(`正在切换至 ${name}...`, "info");
                const res = await fetch("/api/use", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name }) });
                if (!res.ok) throw new Error("接口响应异常");
                setTimeout(() => { fetchAccounts(); showToast(`已成功切换至 ${name}`, "success"); }, 300);
            } catch (e) { showToast(`切换至 ${name} 失败`, "error"); }
        }

        async function refreshUsage(name, btnElement) {
            const svg = btnElement.querySelector("svg");
            if (svg) svg.classList.add("animate-spin");
            btnElement.disabled = true;
            try {
                const res = await fetch("/api/refresh", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name }) });
                const data = await res.json();
                if (!res.ok || (data.usage && data.usage.error)) throw new Error((data.usage && data.usage.error) ? data.usage.error : "刷新接口异常");
                showToast(`${name} 额度已更新`, "success");
            } catch (e) {
                const cleanMsg = e.message.includes('：') ? e.message.split('：').pop() : e.message;
                showToast(`错误: ${cleanMsg}`, "error");
            } finally {
                await fetchAccounts();
                if (svg) svg.classList.remove("animate-spin");
                btnElement.disabled = false;
            }
        }

        function render(accounts) {
            const container = document.getElementById("accountList");
            container.innerHTML = accounts.map((acc) => {
                const weeklyUsedPercent = acc.usage?.secondaryUsedPercent;
                const isWeeklyExhausted = weeklyUsedPercent !== undefined && weeklyUsedPercent !== null && weeklyUsedPercent >= 100;

                let cardBorderClasses = "border-slate-100 hover:border-slate-200 hover:shadow-md"; 
                if (acc.isCurrent) cardBorderClasses = "border-emerald-400 ring-4 ring-emerald-50"; 
                else if (isWeeklyExhausted) cardBorderClasses = "border-red-400 ring-2 ring-red-50 bg-red-50/10"; 

                let btnClasses = "", btnText = "", btnDisabled = "";
                if (acc.isCurrent) { btnClasses = "bg-slate-50 text-slate-400 cursor-default"; btnText = "使用中"; btnDisabled = "disabled"; }
                else if (isWeeklyExhausted) { btnClasses = "bg-slate-100 text-slate-400 opacity-70 cursor-not-allowed"; btnText = "额度耗尽"; btnDisabled = "disabled"; }
                else { btnClasses = "bg-blue-50 text-blue-600 hover:bg-blue-500 hover:text-white"; btnText = "切换使用"; btnDisabled = ""; }

                let errorHtml = '';
                if (acc.usage && acc.usage.error) {
                    errorHtml = `<div class="mb-4 p-2.5 bg-red-50 border border-red-100 rounded-lg text-xs text-red-500 font-medium flex items-start gap-1"><svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="break-words line-clamp-2" title="${acc.usage.error}">${acc.usage.error}</span></div>`;
                }

                return `
                <div class="bg-white p-6 rounded-2xl border ${cardBorderClasses} shadow-sm transition-all relative overflow-hidden group flex flex-col h-full">
                    ${acc.isCurrent ? '<div class="absolute top-0 left-0 w-full h-1 bg-emerald-500"></div>' : ""}
                    ${isWeeklyExhausted && !acc.isCurrent ? '<div class="absolute top-0 left-0 w-full h-1 bg-red-500"></div>' : ""}
                    <div class="flex justify-between items-start mb-2 mt-1">
                        <span class="font-bold text-lg text-slate-800">${acc.name}</span>
                        ${acc.isCurrent ? '<span class="text-[10px] font-bold bg-emerald-100 text-emerald-600 px-2 py-1 rounded-md tracking-wider">当前激活</span>' : ""}
                        ${isWeeklyExhausted && !acc.isCurrent ? '<span class="text-[10px] font-bold bg-red-100 text-red-600 px-2 py-1 rounded-md tracking-wider">不可用</span>' : ""}
                    </div>
                    <p class="text-sm text-slate-400 mb-5 truncate" title="${acc.email || "未知邮箱"}">${acc.email || "未知邮箱"}</p>
                    ${errorHtml}
                    <div class="space-y-4 flex-1">
                        ${renderBar("5h Limit", acc.usage?.primaryUsedPercent, acc.usage?.primaryResetLabel)}
                        ${renderBar("Weekly", acc.usage?.secondaryUsedPercent, acc.usage?.secondaryResetLabel)}
                    </div>
                    <div class="mt-6 flex gap-3">
                        <button ${btnDisabled} onclick="switchAccount('${acc.name}')" class="flex-1 ${btnClasses} py-2 rounded-xl text-sm font-semibold transition-colors duration-200">${btnText}</button>
                        <button onclick="refreshUsage('${acc.name}', this)" class="p-2 border border-slate-100 bg-slate-50 text-slate-400 hover:bg-slate-100 hover:text-slate-600 rounded-xl transition-colors" title="刷新该账号额度"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
                    </div>
                </div>`;
            }).join("");
        }

        function renderBar(label, percent, resetLabel) {
            if (percent === null || percent === undefined) return "";
            const remaining = Math.max(0, Math.min(100, Math.round(100 - percent)));
            let colorClass = "bg-emerald-400", textColor = "text-slate-600";
            if (remaining <= 10) { colorClass = "bg-red-500"; textColor = "text-red-500 font-bold"; } 
            else if (remaining <= 40) colorClass = "bg-amber-400"; 
            else if (remaining <= 80) colorClass = "bg-orange-400";
            const visualWidth = Math.max(1.5, remaining);
            const resetHtml = resetLabel ? `<div class="text-[10.5px] text-slate-400 mt-1.5 text-right font-medium tracking-wide">${resetLabel}</div>` : '';
            return `
            <div class="mb-2">
                <div class="flex justify-between text-xs mb-1.5"><span class="text-slate-400 font-medium">${label}</span><span class="${textColor}">${remaining}% 剩余</span></div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div class="${colorClass} h-full rounded-full progress-bar" style="width: ${visualWidth}%"></div></div>
                ${resetHtml}
            </div>`;
        }

        // 自动刷新逻辑
        setInterval(() => { if (!document.hidden) fetchAccounts(false); }, 300000);
        document.addEventListener("visibilitychange", () => { if (!document.hidden) fetchAccounts(false); });
        fetchAccounts(false);
    </script>
</body>
</html>
